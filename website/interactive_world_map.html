
<div style="padding: 1rem 0;">
  <div id="map-container" style="width: 100%; max-width: 680px; height: 420px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); overflow: hidden; position: relative; background: #1a2744; background-image: linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px); background-size: 28px 28px; cursor: grab; user-select: none;">
    <div id="map-hint" style="position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 11px; color: rgba(255,255,255,0.35); pointer-events: none; white-space: nowrap; z-index: 10;">scroll to zoom · drag to pan</div>
    <div id="zoom-controls" style="position: absolute; top: 12px; right: 12px; z-index: 20; display: flex; flex-direction: column; gap: 4px;">
      <button onclick="doZoom(1.3)" style="width: 28px; height: 28px; background: rgba(255,255,255,0.12); border: 0.5px solid rgba(255,255,255,0.2); border-radius: 6px; color: white; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1;">+</button>
      <button onclick="doZoom(1/1.3)" style="width: 28px; height: 28px; background: rgba(255,255,255,0.12); border: 0.5px solid rgba(255,255,255,0.2); border-radius: 6px; color: white; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1;">−</button>
      <button onclick="resetView()" style="width: 28px; height: 28px; background: rgba(255,255,255,0.12); border: 0.5px solid rgba(255,255,255,0.2); border-radius: 6px; color: rgba(255,255,255,0.7); font-size: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1;">⊙</button>
    </div>
    <svg id="world-svg" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: visible;"></svg>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script>
const container = document.getElementById('map-container');
const svg = d3.select('#world-svg');
const W = container.clientWidth, H = container.clientHeight;

const projection = d3.geoNaturalEarth1().scale(W / 6.4).translate([W / 2, H / 2]);
const path = d3.geoPath().projection(projection);
const g = svg.append('g');

let transform = { x: 0, y: 0, k: 1 };
const minScale = 0.7, maxScale = 12;

const countryLabels = {
  "840": { name: "USA", cx: -100, cy: 40 },
  "124": { name: "Canada", cx: -95, cy: 60 },
  "484": { name: "Mexico", cx: -102, cy: 24 },
  "032": { name: "Argentina", cx: -65, cy: -35 },
  "076": { name: "Brazil", cx: -52, cy: -10 },
  "170": { name: "Colombia", cx: -74, cy: 4 },
  "604": { name: "Peru", cx: -76, cy: -10 },
  "152": { name: "Chile", cx: -71, cy: -35 },
  "858": { name: "Uruguay", cx: -56, cy: -33 },
  "862": { name: "Venezuela", cx: -66, cy: 8 },
  "250": { name: "France", cx: 2, cy: 46 },
  "276": { name: "Germany", cx: 10, cy: 51 },
  "380": { name: "Italy", cx: 12, cy: 43 },
  "724": { name: "Spain", cx: -3, cy: 40 },
  "826": { name: "UK", cx: -2, cy: 54 },
  "616": { name: "Poland", cx: 19, cy: 52 },
  "804": { name: "Ukraine", cx: 31, cy: 49 },
  "643": { name: "Russia", cx: 90, cy: 62 },
  "792": { name: "Turkey", cx: 35, cy: 39 },
  "818": { name: "Egypt", cx: 30, cy: 27 },
  "566": { name: "Nigeria", cx: 8, cy: 10 },
  "710": { name: "S. Africa", cx: 25, cy: -29 },
  "404": { name: "Kenya", cx: 38, cy: 1 },
  "012": { name: "Algeria", cx: 3, cy: 28 },
  "368": { name: "Iraq", cx: 44, cy: 33 },
  "682": { name: "Saudi Arabia", cx: 45, cy: 24 },
  "364": { name: "Iran", cx: 53, cy: 32 },
  "356": { name: "India", cx: 80, cy: 22 },
  "156": { name: "China", cx: 105, cy: 35 },
  "392": { name: "Japan", cx: 138, cy: 37 },
  "410": { name: "S. Korea", cx: 128, cy: 36 },
  "036": { name: "Australia", cx: 134, cy: -25 },
  "554": { name: "New Zealand", cx: 172, cy: -42 },
  "360": { name: "Indonesia", cx: 117, cy: -2 },
  "458": { name: "Malaysia", cx: 110, cy: 4 },
  "764": { name: "Thailand", cx: 101, cy: 15 },
  "704": { name: "Vietnam", cx: 106, cy: 16 },
  "586": { name: "Pakistan", cx: 69, cy: 30 },
  "050": { name: "Bangladesh", cx: 90, cy: 24 },
  "504": { name: "Morocco", cx: -6, cy: 32 },
  "729": { name: "Sudan", cx: 30, cy: 15 },
  "231": { name: "Ethiopia", cx: 40, cy: 9 },
  "024": { name: "Angola", cx: 18, cy: -12 },
  "180": { name: "D.R. Congo", cx: 24, cy: -2 },
  "834": { name: "Tanzania", cx: 35, cy: -6 },
  "516": { name: "Namibia", cx: 18, cy: -22 },
  "716": { name: "Zimbabwe", cx: 30, cy: -19 },
  "348": { name: "Hungary", cx: 19, cy: 47 },
  "203": { name: "Czechia", cx: 15.5, cy: 50 },
  "040": { name: "Austria", cx: 14, cy: 47 },
  "208": { name: "Denmark", cx: 10, cy: 56 },
  "752": { name: "Sweden", cx: 15, cy: 62 },
  "578": { name: "Norway", cx: 8, cy: 65 },
  "246": { name: "Finland", cx: 26, cy: 64 },
};

function applyTransform() {
  g.attr('transform', `translate(${transform.x},${transform.y}) scale(${transform.k})`);
  svg.selectAll('.country-label')
    .style('font-size', `${Math.min(9, 7 / transform.k)}px`)
    .style('opacity', transform.k > 1.2 ? 1 : 0.8);
}

function doZoom(factor) {
  const newK = Math.min(maxScale, Math.max(minScale, transform.k * factor));
  const cx = W / 2, cy = H / 2;
  transform.x = cx - (cx - transform.x) * (newK / transform.k);
  transform.y = cy - (cy - transform.y) * (newK / transform.k);
  transform.k = newK;
  applyTransform();
}

function resetView() {
  transform = { x: 0, y: 0, k: 1 };
  applyTransform();
}

let dragging = false, startX, startY, startTX, startTY;
container.addEventListener('mousedown', e => {
  dragging = true; startX = e.clientX; startY = e.clientY;
  startTX = transform.x; startTY = transform.y;
  container.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  transform.x = startTX + e.clientX - startX;
  transform.y = startTY + e.clientY - startY;
  applyTransform();
});
window.addEventListener('mouseup', () => { dragging = false; container.style.cursor = 'grab'; });

container.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    dragging = true; startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    startTX = transform.x; startTY = transform.y;
  }
}, { passive: true });
container.addEventListener('touchmove', e => {
  if (!dragging || e.touches.length !== 1) return;
  transform.x = startTX + e.touches[0].clientX - startX;
  transform.y = startTY + e.touches[0].clientY - startY;
  applyTransform();
}, { passive: true });
container.addEventListener('touchend', () => { dragging = false; });

container.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = container.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
  const newK = Math.min(maxScale, Math.max(minScale, transform.k * factor));
  transform.x = mx - (mx - transform.x) * (newK / transform.k);
  transform.y = my - (my - transform.y) * (newK / transform.k);
  transform.k = newK;
  applyTransform();
}, { passive: false });

fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r => r.json())
  .then(world => {
    const countries = topojson.feature(world, world.objects.countries);
    const borders = topojson.mesh(world, world.objects.countries, (a, b) => a !== b);

    g.selectAll('.country')
      .data(countries.features)
      .join('path')
      .attr('class', 'country')
      .attr('d', path)
      .attr('fill', d => {
        const id = String(d.id).padStart(3, '0');
        return countryLabels[id] ? '#2a4a8a' : '#203570';
      })
      .attr('stroke', '#1a2744')
      .attr('stroke-width', 0.5);

    g.append('path')
      .datum(borders)
      .attr('d', path)
      .attr('fill', 'none')
      .attr('stroke', 'rgba(100,140,220,0.4)')
      .attr('stroke-width', 0.4);

    Object.entries(countryLabels).forEach(([id, info]) => {
      const [px, py] = projection([info.cx, info.cy]);
      g.append('text')
        .attr('class', 'country-label')
        .attr('x', px).attr('y', py)
        .text(info.name)
        .style('font-size', '7px')
        .style('font-family', 'var(--font-sans, sans-serif)')
        .style('font-weight', '500')
        .style('fill', 'rgba(200,220,255,0.85)')
        .style('text-anchor', 'middle')
        .style('pointer-events', 'none')
        .style('letter-spacing', '0.3px');
    });
  });
</script>
